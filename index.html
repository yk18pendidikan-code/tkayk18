<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Rapor Digital Evaluasi - Neutron Murangan</title>

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

  <style>
    :root {
      --primary: #c1121f;
      --primary-dark: #9b0f17;
      --gold: #d4a017;
      --blue: #0369a1;
      --blue-dark: #075985;
      --bg-main: #f8fafc;
      --surface: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --radius-lg: 16px;
      --radius-md: 12px;
    }

    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-main); color: var(--text-main); }

    .custom-navbar {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 1000; padding: 12px 0;
      box-shadow: 0 4px 20px rgba(0,0,0,0.03);
    }
    
    .logo-img { height: 40px; width: auto; object-fit: contain; }

    .btn-leaderboard-nav {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff; border: none; padding: 10px 16px; border-radius: var(--radius-md);
      font-size: 13px; font-weight: 700; box-shadow: 0 4px 15px -3px rgba(193,18,31,0.3); transition: all 0.3s ease;
    }
    .btn-leaderboard-nav:hover { transform: translateY(-2px); box-shadow: 0 6px 20px -3px rgba(193,18,31,0.4); color: #fff; }

    .controls-wrapper { background: var(--surface); border-radius: var(--radius-lg); padding: 20px; border: 1px solid var(--border); box-shadow: 0 10px 30px -5px rgb(0 0 0 / 0.03); margin-bottom: 25px; }

    .search-box { position: relative; }
    .search-box i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
    .search-input {
      border-radius: var(--radius-md); border: 2px solid transparent; padding: 12px 16px 12px 45px;
      font-size: 14px; width: 100%; transition: all 0.2s ease; background-color: #f1f5f9; font-weight: 500;
    }
    .search-input:focus { background-color: var(--surface); border-color: var(--primary); box-shadow: 0 0 0 4px rgba(193, 18, 31, 0.1); outline: none; }

    .btn-toggle-group { background: #f1f5f9; padding: 5px; border-radius: var(--radius-md); display: inline-flex; width: 100%; }
    .btn-toggle-mode { flex: 1; border: none; padding: 10px; border-radius: 10px; font-size: 13px; font-weight: 700; transition: all 0.2s ease; background: transparent; color: var(--text-muted); }
    .btn-toggle-mode.active { background: var(--surface); color: var(--primary); box-shadow: 0 4px 12px rgb(0 0 0 / 0.05); }

    .cabang-banner { background: linear-gradient(135deg, #f0f9ff, #ffffff); border: 1px solid #bae0fd; border-radius: var(--radius-md); padding: 12px; font-size: 13px; font-weight: 700; color: var(--blue-dark); display: flex; align-items: center; gap: 8px; margin-top: 15px; }

    .student-card { background: var(--surface); border-radius: var(--radius-lg); padding: 20px; border: 1px solid var(--border); cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); height: 100%; position: relative; display: flex; flex-direction: column; justify-content: center; }
    .student-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 15px 30px -5px rgb(193 18 31 / 0.1); }
    
    .rank-pill { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: #fff; font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 20px; border: 2px solid #fff; width: fit-content; }
    .rank-pill.top3 { background: linear-gradient(135deg, #d4a017, #a87908); }

    .session-card { background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border); padding: 20px; margin-bottom: 25px; box-shadow: 0 4px 15px rgb(0 0 0 / 0.02); }
    .session-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px dashed var(--border); padding-bottom: 15px; margin-bottom: 15px; flex-wrap: wrap; gap: 12px; }

    .score-chip { background: #f8fafc; border: 1px solid var(--border); padding: 8px 12px; border-radius: var(--radius-md); font-size: 12px; font-weight: 600; color: var(--text-muted); }
    .score-chip .val { color: var(--text-main); font-weight: 800; margin-left: 4px; font-size: 13px; }
    .score-chip.highlight { background: #fff1f2; border-color: #fecaca; }
    .score-chip.highlight .val { color: var(--primary); }

    .table-clean { width: 100%; font-size: 13px; margin-bottom: 0; border-collapse: separate; border-spacing: 0; }
    .table-clean th { background: #f8fafc; font-weight: 700; color: var(--text-main); padding: 12px 10px; text-align: center; border-bottom: 2px solid var(--border); text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
    .table-clean td { padding: 12px 10px; text-align: center; border-bottom: 1px solid var(--border); background: var(--surface); font-weight: 600; }
    .table-clean tbody tr:last-child td { border-bottom: none; }
    
    .text-above-avg { color: #166534 !important; font-weight: 700; }
    .text-below-avg { color: #b91c1c !important; font-weight: 700; }

    .badge-kat { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; display: inline-block; }
    .kat-istimewa { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
    .kat-sangat-baik { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .kat-baik { background: #e0f2fe; color: #0369a1; border: 1px solid #bae0fd; }
    .kat-cukup { background: #fef9c3; color: #854d0e; border: 1px solid #fef08a; }
    .kat-kurang { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

    .chart-card { background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border); padding: 20px; margin-bottom: 25px; }
    .chart-filter-select { max-width: 100%; border-radius: var(--radius-md); font-size: 13px; font-weight: 600; padding: 10px 15px; background-color: #f8fafc; border: 1px solid var(--border); }

    .ranking-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 20px; }
    .ranking-grid.has-cabang { grid-template-columns: 1fr 1fr; }

    .ranking-card { background: linear-gradient(135deg, #fff5f5 0%, #ffffff 100%); border: 1px solid #fecaca; border-radius: var(--radius-lg); padding: 15px; display: flex; align-items: center; gap: 15px; }
    .ranking-card.cabang-variant { background: linear-gradient(135deg, #eff8ff 0%, #ffffff 100%); border: 1px solid #bae0fd; }

    .rank-number-box { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: #fff; border-radius: var(--radius-md); padding: 12px; text-align: center; min-width: 100px; box-shadow: 0 6px 12px -3px rgba(193, 18, 31, 0.3); }
    .rank-number-box.rank-top { background: linear-gradient(135deg, #d4a017, #a87908); box-shadow: 0 6px 12px -3px rgba(212, 160, 23, 0.3); }
    .rank-number-box.blue-box { background: linear-gradient(135deg, var(--blue), var(--blue-dark)); box-shadow: 0 6px 12px -3px rgba(3, 105, 161, 0.3); }

    .rank-label { font-size: 9px; font-weight: 800; opacity: 0.9; letter-spacing: 0.5px; margin-bottom: 3px; text-transform: uppercase; }
    .rank-value { font-size: 26px; font-weight: 800; line-height: 1; margin-bottom: 2px; }
    .rank-sub { font-size: 9px; opacity: 0.9; }

    .rank-stat-label { font-size: 10px; font-weight: 700; color: var(--text-muted); margin-bottom: 2px; }
    .rank-stat-value { font-size: 16px; font-weight: 800; color: var(--text-main); }

    .btn-outline-leaderboard { border: 2px solid var(--primary); color: var(--primary); background: #fff; font-weight: 700; border-radius: var(--radius-md); padding: 8px 14px; font-size: 13px; transition: all 0.2s; }
    .btn-outline-leaderboard:hover { background: var(--primary); color: #fff; }

    .lb-row-top1 { background: linear-gradient(90deg, #fffbeb, #ffffff) !important; }
    .lb-row-top2 { background: linear-gradient(90deg, #f8fafc, #ffffff) !important; }
    .lb-row-top3 { background: linear-gradient(90deg, #fef2f2, #ffffff) !important; }
    .lb-row-me td { border-top: 2px solid var(--primary); border-bottom: 2px solid var(--primary); }
    .lb-row-me td:first-child { border-left: 2px solid var(--primary); }
    .lb-row-me td:last-child { border-right: 2px solid var(--primary); }

    /* RESPONSIVE SMARTPHONE REPAIR */
    @media (max-width: 768px) {
      .custom-navbar { padding: 10px 0; }
      .custom-navbar .container { flex-direction: column; text-align: center; gap: 10px !important; }
      .btn-leaderboard-nav { width: 100%; }
      .controls-wrapper { padding: 15px; }
      .ranking-grid.has-cabang { grid-template-columns: 1fr; }
      .ranking-card { flex-direction: column; text-align: center; align-items: center; }
      .rank-number-box { width: 100%; }
      .session-header { flex-direction: column; align-items: flex-start; }
      .session-header div:last-child { width: 100%; display: flex; gap: 8px; }
      .session-header .btn { flex: 1; font-size: 12px; padding: 8px; }
      .modal-body { padding: 10px !important; }
      .chart-card { padding: 15px; }
      .score-chip { font-size: 11px; padding: 6px 10px; }
    }
  </style>
</head>
<body>

<nav class="custom-navbar">
  <div class="container d-flex justify-content-between align-items-center flex-wrap gap-3">
    <div class="d-flex align-items-center gap-3 flex-wrap justify-content-center">
      <img src="https://tosbmptn15ub.weebly.com/uploads/4/6/1/4/46146887/929305838.png" alt="Logo" class="logo-img">
      <div class="text-sm-start text-center">
        <span class="fw-800 text-dark d-block lh-1" style="font-size: 16px; letter-spacing: -0.5px;">PORTAL RAPOR DIGITAL</span>
        <span class="text-muted fw-bold" style="font-size: 11px; letter-spacing: 0.5px;">NEUTRON MURANGAN</span>
      </div>
    </div>
    <button class="btn-leaderboard-nav" onclick="openLeaderboardModal(null)">
      <i class="fa-solid fa-trophy me-2 text-warning"></i>Papan Peringkat Nasional
    </button>
  </div>
</nav>

<div class="container my-3 px-3">
  <div class="controls-wrapper">
    <div class="row g-3 align-items-center">
      <div class="col-12 col-md-5">
        <div class="search-box">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" class="search-input" id="searchInput" placeholder="Cari nama siswa di sini..." onkeyup="renderCurrentList()">
        </div>
      </div>
      <div class="col-12 col-md-4">
        <div class="btn-toggle-group">
          <button class="btn-toggle-mode active" id="btnSortNama" onclick="switchSortMode('NAMA')"><i class="fa-solid fa-arrow-down-a-z me-2"></i>Nama</button>
          <button class="btn-toggle-mode" id="btnSortRank" onclick="switchSortMode('RANK')"><i class="fa-solid fa-ranking-star me-2"></i>Peringkat</button>
        </div>
      </div>
      <div class="col-12 col-md-3" id="sesiRankSelectorWrap" style="display:none;">
        <select class="form-select fw-bold search-input" id="sesiRankSelect" onchange="renderCurrentList()"></select>
      </div>
    </div>
    <div class="cabang-banner">
      <i class="fa-solid fa-map-pin text-primary"></i>
      <span>Cabang: <b id="cabangBannerNama" class="text-primary">YOGYAKARTA-18</b> — <span id="cabangBannerCount" class="badge bg-primary rounded-pill ms-1">0</span> siswa</span>
    </div>
  </div>

  <div class="row g-3" id="student-list">
    <div class="col-12 text-center p-5">
      <div class="spinner-border text-danger" role="status"></div>
      <p class="mt-3 text-muted fw-bold">Menyinkronkan Data Evaluasi...</p>
    </div>
  </div>
</div>

<div class="modal fade" id="detailModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-fullscreen">
    <div class="modal-content" style="background-color: var(--bg-main);">
      
      <div class="bg-white border-bottom px-3 py-3 d-flex justify-content-between align-items-center sticky-top shadow-sm">
        <div>
          <h4 class="fw-800 text-dark m-0 mb-1" id="m-nama" style="font-size: 18px;">Nama Siswa</h4>
          <div class="text-muted d-flex gap-2 flex-wrap" id="m-meta" style="font-size: 11px; font-weight: 600;"></div>
        </div>
        <button type="button" class="btn-close bg-light p-2 rounded-circle" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <div class="modal-body p-2 p-md-4">
        <div class="container p-0">
          
          <div class="chart-card shadow-sm">
            <div class="row g-2 text-center mb-3 border-bottom pb-3" id="overall-stats-container" style="font-size: 12px;"></div>
            <div class="d-flex flex-column gap-2 mb-3">
              <div class="d-flex align-items-center gap-2">
                <div class="bg-danger-subtle text-danger p-2 rounded-circle" style="width:30px; height:30px; display:flex; align-items:center; justify-content:center;"><i class="fa-solid fa-chart-line fs-6"></i></div>
                <h6 class="fw-800 m-0 text-dark" style="font-size: 14px;">Grafik Tren Evaluasi Belajar (Rerata dari Sesi ke Sesi)</h6>
              </div>
              <select class="form-select chart-filter-select text-dark" id="chartMapelSelect" onchange="updateChartView()"></select>
            </div>
            <div style="position: relative; height:220px; width:100%">
              <canvas id="trendChart"></canvas>
            </div>
          </div>

          <div id="m-content-sesi"></div>

        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="leaderboardModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg">
      <div class="modal-header text-white" style="background: linear-gradient(135deg, var(--primary), var(--primary-dark));">
        <h5 class="modal-title fw-800 fs-6"><i class="fa-solid fa-trophy me-2 text-warning"></i>Papan Peringkat Nasional</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-3 bg-light">
        <div class="row g-2 mb-3 bg-white p-3 rounded-4 shadow-sm border">
          <div class="col-12 col-md-4">
            <label class="small fw-bold text-muted mb-1">SESI EVALUASI</label>
            <select class="form-select fw-bold bg-light" id="lbSesiSelect" onchange="renderLeaderboardTable()"></select>
          </div>
          <div class="col-12 col-md-4">
            <label class="small fw-bold text-muted mb-1">FILTER CABANG</label>
            <select class="form-select fw-bold bg-light" id="lbCabangSelect" onchange="renderLeaderboardTable()">
              <option value="ALL">🌍 Semua Cabang (Nasional)</option>
            </select>
          </div>
          <div class="col-12 col-md-4">
            <label class="small fw-bold text-muted mb-1">CARI NAMA</label>
            <input type="text" class="form-control fw-bold bg-light" id="lbSearchInput" placeholder="Ketik nama..." onkeyup="renderLeaderboardTable()">
          </div>
        </div>
        
        <div class="d-flex justify-content-between align-items-center mb-2">
            <div id="lb-summary" class="small text-muted fw-bold" style="font-size: 11px;"></div>
        </div>

        <div class="bg-white border rounded-4 overflow-hidden shadow-sm">
          <div class="table-responsive" style="max-height: 50vh;">
            <table class="table table-clean lb-table mb-0">
              <thead>
                <tr>
                  <th style="width:60px;">Rank</th>
                  <th class="text-start">Nama Peserta</th>
                  <th>Cabang</th>
                  <th>Rerata</th>
                  <th>Total</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="lb-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbyC9OY4y0GB-JXFJrdVZkf2RhOAfOv0BnoZha6KHC-E7PVtMACnYGSdNLLOv3s7SlUFcw/exec"; 

  var MASTER_DATA = [];        
  var CABANG_DATA = [];        
  var CURRENT_LIST = [];       
  var SORT_MODE = 'NAMA';
  var LOGO_URL = "https://tosbmptn15ub.weebly.com/uploads/4/6/1/4/46146887/929305838.png";
  var globalChartInstance = null;
  var sessionChartInstances = {}; 
  var currentSesiDataGlobal = {};
  var currentSesiLabelsGlobal = [];

  var SESI_LIST_GLOBAL = [];
  var LEADERBOARD_ALL = {};      
  var LEADERBOARD_CABANG = {};   
  var TARGET_CABANG_NAME = "";
  var LB_FOCUS_NAMA = null;      

  var LOGO_DATAURL = null;
  var LOGO_RATIO = 40 / 14; 

  function preloadLogoForPDF() {
    return new Promise(function (resolve) {
      var img = new Image();
      img.crossOrigin = "Anonymous";
      img.onload = function () {
        try {
          var canvas = document.createElement('canvas');
          canvas.width = img.naturalWidth;
          canvas.height = img.naturalHeight;
          var ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);
          LOGO_DATAURL = canvas.toDataURL('image/png');
          if (img.naturalWidth > 0 && img.naturalHeight > 0) {
            LOGO_RATIO = img.naturalWidth / img.naturalHeight;
          }
        } catch (e) {
          console.warn("CORS issue with Logo", e);
        }
        resolve();
      };
      img.onerror = function () { resolve(); };
      img.src = LOGO_URL;
    });
  }
  var logoReadyPromise = preloadLogoForPDF();

  document.addEventListener("DOMContentLoaded", function() {
    fetch(API_URL)
      .then(response => response.json())
      .then(res => {
        if (res.error) throw new Error(res.message);

        var rawData = res.siswaData || [];
        rawData.sort(function(a, b) { return a.nama.localeCompare(b.nama, 'id', { sensitivity: 'base' }); });

        MASTER_DATA = rawData;
        SESI_LIST_GLOBAL = res.sesiList || [];
        LEADERBOARD_ALL = res.leaderboard || {};
        LEADERBOARD_CABANG = res.leaderboardCabang || {};
        TARGET_CABANG_NAME = res.targetCabang || "CABANG";

        CABANG_DATA = MASTER_DATA.filter(function(s) {
          return normalizeLabelJS(s.cabang) === normalizeLabelJS(TARGET_CABANG_NAME);
        });

        document.getElementById('cabangBannerNama').innerText = TARGET_CABANG_NAME;
        document.getElementById('cabangBannerCount').innerText = CABANG_DATA.length;

        setupSesiRankSelector();
        setupLeaderboardSelectors();
        renderCurrentList();
      })
      .catch(err => {
        console.error("Gagal memuat data:", err);
        document.getElementById('student-list').innerHTML =
          '<div class="col-12 text-center text-danger p-5"><i class="fa-solid fa-triangle-exclamation fs-1 mb-3"></i><h5 class="fw-bold">Gagal Menyinkronkan Data</h5><p class="text-muted">Pastikan URL Web App Google Apps Script sudah diatur dengan benar.</p></div>';
      });
  });

  function normalizeLabelJS(s) {
    if (s === null || s === undefined) return '';
    return s.toString().trim().toUpperCase().replace(/[^A-Z0-9]/g, '');
  }

  function setupSesiRankSelector() {
    var sel = document.getElementById('sesiRankSelect');
    sel.innerHTML = "";
    var sortedSesi = SESI_LIST_GLOBAL.slice().sort(function(a,b){ return b.localeCompare(a, undefined, {numeric:true, sensitivity:'base'}); });
    sortedSesi.forEach(function(sesi) {
      var opt = document.createElement('option');
      opt.value = sesi;
      opt.innerText = "Sesi: " + sesi;
      sel.appendChild(opt);
    });
  }

  function switchSortMode(mode) {
    SORT_MODE = mode;
    document.getElementById('btnSortNama').classList.toggle('active', mode === 'NAMA');
    document.getElementById('btnSortRank').classList.toggle('active', mode === 'RANK');
    document.getElementById('sesiRankSelectorWrap').style.display = (mode === 'RANK') ? 'block' : 'none';
    renderCurrentList();
  }

  // Menghitung nilai rata-rata seluruh peserta secara realtime berdasarkan sesi dan subtes
  function hitungRerataNasionalSubtes(sesiName) {
    var totalNilaiPerMapel = {};
    var jumlahPesertaPerMapel = {};

    MASTER_DATA.forEach(function(siswa) {
      if (siswa.sesiData && siswa.sesiData[sesiName]) {
        var subjects = siswa.sesiData[sesiName].subjects || [];
        subjects.forEach(function(sub) {
          var namaMapel = sub.nama.trim().toUpperCase();
          if (!totalNilaiPerMapel[namaMapel]) {
            totalNilaiPerMapel[namaMapel] = 0;
            jumlahPesertaPerMapel[namaMapel] = 0;
          }
          totalNilaiPerMapel[namaMapel] += Number(sub.nilai || 0);
          jumlahPesertaPerMapel[namaMapel]++;
        });
      }
    });

    var rerataHasil = {};
    for (var mapel in totalNilaiPerMapel) {
      rerataHasil[mapel] = totalNilaiPerMapel[mapel] / jumlahPesertaPerMapel[mapel];
    }
    return rerataHasil;
  }

  function renderCurrentList() {
    var query = document.getElementById('searchInput').value.toLowerCase();
    var filtered = CABANG_DATA.filter(function(s) { return s.nama.toLowerCase().includes(query); });

    if (SORT_MODE === 'NAMA') {
      filtered.sort(function(a, b) { return a.nama.localeCompare(b.nama, 'id', { sensitivity: 'base' }); });
    } else {
      var sesiAcuan = document.getElementById('sesiRankSelect').value;
      filtered.sort(function(a, b) {
        var ra = (a.sesiRankingCabang && a.sesiRankingCabang[sesiAcuan]) ? a.sesiRankingCabang[sesiAcuan].peringkat : null;
        var rb = (b.sesiRankingCabang && b.sesiRankingCabang[sesiAcuan]) ? b.sesiRankingCabang[sesiAcuan].peringkat : null;
        if (ra === null && rb === null) return a.nama.localeCompare(b.nama, 'id', { sensitivity: 'base' });
        if (ra === null) return 1;
        if (rb === null) return -1;
        return ra - rb;
      });
    }

    CURRENT_LIST = filtered;
    renderDaftarSiswa(filtered);
  }

  function renderDaftarSiswa(data) {
    var container = document.getElementById('student-list');
    if (!data || data.length === 0) {
      container.innerHTML = '<div class="col-12 text-center p-5 text-muted fw-bold">Siswa tidak ditemukan.</div>';
      return;
    }

    var sesiAcuan = (SORT_MODE === 'RANK') ? document.getElementById('sesiRankSelect').value : null;

    var html = '';
    data.forEach(function(siswa, idx) {
      var rankBadge = '';
      if (SORT_MODE === 'RANK' && siswa.sesiRankingCabang && siswa.sesiRankingCabang[sesiAcuan]) {
        var rk = siswa.sesiRankingCabang[sesiAcuan].peringkat;
        rankBadge = '<span class="rank-pill mb-2 d-inline-block' + (rk <= 3 ? ' top3' : '') + '">#' + rk + ' Cabang</span>';
      }

      var sesiNamesSiswa = Object.keys(siswa.sesiData || {}).sort(function(a,b){ return b.localeCompare(a, undefined, {numeric:true, sensitivity:'base'}); });
      var ringkasan = '';
      if (sesiNamesSiswa.length > 0) {
        var sTerbaru = siswa.sesiData[sesiNamesSiswa[0]];
        ringkasan = '<div class="d-flex justify-content-between align-items-center flex-wrap gap-1">' +
                    '  <span class="badge-kat ' + getKeteranganClass(sTerbaru.keterangan) + '">' + (sTerbaru.keterangan || '-') + '</span>' +
                    '  <span class="text-muted" style="font-size:11px; font-weight:600;">Rerata: <b class="text-dark">' + Number(sTerbaru.rerata).toFixed(2) + '</b></span>' +
                    '</div>';
      }

      html += '<div class="col-12 col-md-6 col-lg-4">' +
              '  <div class="student-card shadow-sm" onclick="bukaDetailSiswaByNama(\'' + siswa.nama.replace(/'/g,"\\'") + '\')">' +
              '    <div class="d-flex justify-content-between align-items-start gap-2 mb-2">' +
              '       <div class="fw-800 text-dark text-truncate" style="font-size:15px; max-width:85%;">' + siswa.nama + '</div>' +
              '       <div class="bg-light rounded-circle d-flex align-items-center justify-content-center" style="width:26px; height:26px; min-width:26px;"><i class="fa-solid fa-chevron-right text-muted" style="font-size:10px;"></i></div>' +
              '    </div>' +
              '    <div class="text-muted mb-2" style="font-size:12px; font-weight:600;"><i class="fa-solid fa-id-card me-2 text-primary"></i>NIS: ' + (siswa.nis || '-') + '</div>' +
              '    <div class="mt-2 pt-2 border-top border-dashed">' + rankBadge + ringkasan + '</div>' +
              '  </div>' +
              '</div>';
    });
    container.innerHTML = html;
  }

  function getKeteranganClass(ket) {
    if (!ket) return "kat-baik";
    var k = ket.toLowerCase();
    if (k.includes("istimewa")) return "kat-istimewa";
    if (k.includes("sangat baik")) return "kat-sangat-baik";
    if (k.includes("baik")) return "kat-baik";
    if (k.includes("memadai")) return "kat-cukup";
    return "kat-kurang";
  }

  function renderSingleRankBox(rankInfo, variantClass, boxClass, labelUtama, showCabangBadge) {
    var persentil = rankInfo.totalPeserta > 0 ? Math.round((rankInfo.peringkat / rankInfo.totalPeserta) * 100) : 100;
    var ketClass = getKeteranganClass(rankInfo.keterangan);
    var isTop = persentil <= 10;
    var rankBoxClass = boxClass + (isTop ? " rank-top" : "");
    var cabangBadge = showCabangBadge ? '<span class="badge bg-light text-dark border px-2 py-1"><i class="fa-solid fa-map-pin me-1 text-primary"></i>' + (rankInfo.cabang || '-') + '</span>' : '';

    return '<div class="ranking-card ' + variantClass + '">' +
           '     <div class="' + rankBoxClass + '">' +
           '        <div class="rank-label"><i class="fa-solid fa-trophy me-1"></i>' + labelUtama + '</div>' +
           '        <div class="rank-value">#' + rankInfo.peringkat + '</div>' +
           '        <div class="rank-sub">dari ' + rankInfo.totalPeserta + ' peserta</div>' +
           '     </div>' +
           '     <div class="flex-grow-1 w-100">' +
           '        <div class="d-flex gap-1 flex-wrap mb-2">' +
           '          <span class="badge-kat ' + ketClass + '">' + (rankInfo.keterangan || '-') + '</span>' +
           '          ' + cabangBadge +
           '          <span class="badge bg-light text-dark border px-2 py-1">Top ' + persentil + '%</span>' +
           '        </div>' +
           '        <div class="d-flex gap-2 flex-wrap bg-white p-2 rounded-3 border w-100">' +
           '           <div class="pe-2 border-end flex-grow-1 text-center"><div class="rank-stat-label">RERATA</div><div class="rank-stat-value">' + Number(rankInfo.rerata).toFixed(2) + '</div></div>' +
           '           <div class="ps-1 flex-grow-1 text-center"><div class="rank-stat-label">TOTAL</div><div class="rank-stat-value text-primary">' + Number(rankInfo.total).toFixed(2) + '</div></div>' +
           '        </div>' +
           '     </div>' +
           '</div>';
  }

  function bukaDetailSiswaByNama(nama) {
    var idx = CURRENT_LIST.findIndex(function(s){ return s.nama === nama; });
    if (idx !== -1) bukaDetailSiswa(idx);

  // Membuat Bar Chart Komparasi per Sesi layaknya pada file image_d966ad.jpg
  function initSessionBarChart(collapseId, sesiName, index) {
    var canvasId = "canvas_sesi_" + collapseId;
    var canvasEl = document.getElementById(canvasId);
    if (!canvasEl) return;

    if (sessionChartInstances[canvasId]) {
      sessionChartInstances[canvasId].destroy();
    }

    var siswa = CURRENT_LIST[index];
    var sesiObj = siswa.sesiData[sesiName];
    var rerataNasionalMapel = hitungRerataNasionalSubtes(sesiName);

    var subtesLabels = [];
    var nilaiSiswaData = [];
    var nilaiNasionalData = [];

    (sesiObj.subjects || []).forEach(function(s) {
      subtesLabels.push(s.nama.substring(0, 5).toUpperCase() + '.');
      nilaiSiswaData.push(Number(s.nilai || 0));
      nilaiNasionalData.push(Number(rerataNasionalMapel[s.nama.trim().toUpperCase()] || 0));
    });

    var ctx = canvasEl.getContext('2d');
    sessionChartInstances[canvasId] = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: subtesLabels,
        datasets: [
          {
            label: 'Rata-rata Anda',
            data: nilaiSiswaData,
            backgroundColor: '#0369a1',
            borderRadius: 4
          },
          {
            label: 'Rata-rata Seluruh Peserta',
            data: nilaiNasionalData,
            backgroundColor: '#d4a017',
            borderRadius: 4
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { position: 'bottom', labels: { font: { family: 'Plus Jakarta Sans', size: 10, weight: 'bold' } } }
        },
        scales: {
          y: { min: 0, max: 100, ticks: { font: { family: 'Plus Jakarta Sans', size: 10, weight: 'bold' } } },
          x: { ticks: { font: { family: 'Plus Jakarta Sans', size: 9, weight: 'bold' } } }
        }
      }
    });
  }

  function setupMapelDropdownOptions(sesiData) {
    var selectMapel = document.getElementById('chartMapelSelect');
    selectMapel.innerHTML = "";

    var mapelSet = new Set();
    for (var sesi in sesiData) {
      (sesiData[sesi].subjects || []).forEach(function(m) { mapelSet.add(m.nama); });
    }

    var optAll = document.createElement('option');
    optAll.value = "ALL";
    optAll.innerText = "📈 Tampilkan Rerata Seluruh Sesi";
    selectMapel.appendChild(optAll);

    mapelSet.forEach(function(mapelName) {
      var opt = document.createElement('option');
      opt.value = mapelName;
      opt.innerText = "📚 Subtes: " + mapelName.toUpperCase();
      selectMapel.appendChild(opt);
    });

    updateChartView();
  }

  function updateChartView() {
    var selectedMapel = document.getElementById('chartMapelSelect').value;
    var reversedLabels = JSON.parse(JSON.stringify(currentSesiLabelsGlobal)).reverse();
    var chartDataPoints = [];
    var activeColor = '#c1121f';

    var totalScoreSum = 0, scoreCount = 0, highestScore = -1, lowestScore = 999, totalAllB = 0;

    reversedLabels.forEach(function(sesi) {
      var sesiObj = currentSesiDataGlobal[sesi] || { subjects: [], rerata: 0 };
      if (selectedMapel === "ALL") {
        var val = Number(sesiObj.rerata || 0);
        chartDataPoints.push(val);
        totalScoreSum += val; scoreCount++;
        if (val > highestScore) highestScore = val;
        if (val < lowestScore) lowestScore = val;
        (sesiObj.subjects || []).forEach(function(m) { totalAllB += Number(m.benar || 0); });
        activeColor = '#c1121f';
      } else {
        var foundMapel = (sesiObj.subjects || []).find(function(m) { return m.nama === selectedMapel; });
        var score = foundMapel ? Number(foundMapel.nilai || 0) : 0;
        chartDataPoints.push(score);
        if (foundMapel) {
          totalScoreSum += score; scoreCount++;
          totalAllB += Number(foundMapel.benar || 0);
          if (score > highestScore) highestScore = score;
          if (score < lowestScore) lowestScore = score;
        }
        activeColor = '#0369a1';
      }
    });

    var overAllRata = scoreCount > 0 ? Math.round((totalScoreSum / scoreCount) * 100) / 100 : 0;
    if (lowestScore === 999) lowestScore = 0;
    if (highestScore === -1) highestScore = 0;

    document.getElementById('overall-stats-container').innerHTML = `
      <div class="col-6 col-md-3 border-end"><div class="fw-bold text-muted small">RERATA AKHIR</div><div class="fs-5 fw-800 text-dark">${overAllRata}</div></div>
      <div class="col-6 col-md-3 border-md-end"><div class="fw-bold text-muted small">TERTINGGI</div><div class="fs-5 fw-800 text-success">${highestScore}</div></div>
      <div class="col-6 col-md-3 border-end"><div class="fw-bold text-muted small">TERENDAH</div><div class="fs-5 fw-800 text-danger">${lowestScore}</div></div>
      <div class="col-6 col-md-3"><div class="fw-bold text-muted small">TOTAL BENAR</div><div class="fs-5 fw-800 text-primary">${totalAllB} <span style="font-size:10px; color:#64748b;">Soal</span></div></div>
    `;

    if (globalChartInstance) { globalChartInstance.destroy(); }

    var ctx = document.getElementById('trendChart').getContext('2d');
    globalChartInstance = new Chart(ctx, {
      type: 'line',
      data: {
        labels: reversedLabels,
        datasets: [{
          data: chartDataPoints, borderColor: activeColor,
          backgroundColor: selectedMapel === "ALL" ? 'rgba(193, 18, 31, 0.06)' : 'rgba(3, 105, 161, 0.06)',
          borderWidth: 2.5, pointRadius: 4, pointBackgroundColor: '#fff', pointBorderColor: activeColor, pointBorderWidth: 2, tension: 0.25, fill: true
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: { min: 0, max: 100, border: {display: false}, grid: {color: '#e2e8f0', drawTicks: false}, ticks: { font: { family: 'Plus Jakarta Sans', size: 10, weight: 'bold' } } },
          x: { border: {display: false}, grid: {display: false}, ticks: { font: { family: 'Plus Jakarta Sans', size: 10, weight: 'bold' } } }
        }
      }
    });
  }

  function setupLeaderboardSelectors() {

  function openLeaderboardModal(sesiName, namaFokus) {
    LB_FOCUS_NAMA = namaFokus || null;
    if (sesiName) document.getElementById('lbSesiSelect').value = sesiName;
    document.getElementById('lbCabangSelect').value = 'ALL';
    document.getElementById('lbSearchInput').value = namaFokus || '';
    renderLeaderboardTable();
    new bootstrap.Modal(document.getElementById('leaderboardModal')).show();
  }

  function renderLeaderboardTable() {
    var sesi = document.getElementById('lbSesiSelect').value;
    var cabangMode = document.getElementById('lbCabangSelect').value;
    var query = document.getElementById('lbSearchInput').value.toLowerCase();

    var sourceArr = (cabangMode === 'TARGET') ? (LEADERBOARD_CABANG[sesi] || []) : (LEADERBOARD_ALL[sesi] || []);
    var filtered = sourceArr.filter(function(row) { return row.nama.toLowerCase().includes(query); });
    var tbody = document.getElementById('lb-tbody');

    if (filtered.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted p-4 fw-bold">Data tidak ditemukan.</td></tr>';
    } else {
      var html = '';
      filtered.forEach(function(row) {
        var rowClass = '';
        if (row.peringkat === 1) rowClass = 'lb-row-top1';
        else if (row.peringkat === 2) rowClass = 'lb-row-top2';
        else if (row.peringkat === 3) rowClass = 'lb-row-top3';
        if (LB_FOCUS_NAMA && row.nama.toLowerCase() === LB_FOCUS_NAMA.toLowerCase()) rowClass += ' lb-row-me';

        var medal = row.peringkat === 1 ? '🥇' : (row.peringkat === 2 ? '🥈' : (row.peringkat === 3 ? '🥉' : ('<span class="text-muted">#' + row.peringkat + '</span>')));
        
        html += '<tr class="' + rowClass + '">' +
                '  <td class="fs-6 text-center">' + medal + '</td>' +
                '  <td class="text-start fw-800 text-dark">' + row.nama + '</td>' +
                '  <td><span class="badge bg-light text-dark border px-2 py-1">' + (row.cabang || '-') + '</span></td>' +
                '  <td class="fw-bold text-dark">' + Number(row.rerata).toFixed(1) + '</td>' +
                '  <td class="fw-800 text-primary">' + Number(row.total).toFixed(1) + '</td>' +
                '  <td><span class="badge-kat ' + getKeteranganClass(row.keterangan) + '">' + (row.keterangan || '-') + '</span></td>' +
                '</tr>';
      });
      tbody.innerHTML = html;
    }

    document.getElementById('lb-summary').innerHTML =
      '<i class="fa-solid fa-users text-primary me-1"></i> Menampilkan <b>' + filtered.length + '</b> dari <b>' + sourceArr.length + '</b> peserta' +
      (cabangMode === 'TARGET' ? ' (' + TARGET_CABANG_NAME + ')' : ' (Nasional)');
  }

  async function downloadSesiPDF(namaSiswa, sesiName, index) {
    await logoReadyPromise; 

    var siswa = CURRENT_LIST[index];
    var sesiObj = siswa.sesiData[sesiName];
    var rankInfo = (siswa.sesiRanking && siswa.sesiRanking[sesiName]) ? siswa.sesiRanking[sesiName] : null;
    var rankInfoCabang = (siswa.sesiRankingCabang && siswa.sesiRankingCabang[sesiName]) ? siswa.sesiRankingCabang[sesiName] : null;
    var { jsPDF } = window.jspdf;

    var doc = new jsPDF('p', 'mm', 'a4');
    var pageW = doc.internal.pageSize.getWidth();
    var marginX = 14;

    var infoLines = [];
    infoLines.push({ text: "Nama Peserta : " + siswa.nama.toUpperCase(), bold: true });
    infoLines.push({ text: "NIS          : " + (siswa.nis || '-') + "  |  Cabang: " + (siswa.cabang || '-'), bold: false });
    infoLines.push({ text: "Sesi Evaluasi: " + sesiName, bold: false });
    if (rankInfo) infoLines.push({ text: "Peringkat Nasional : #" + rankInfo.peringkat + " dari " + rankInfo.totalPeserta + " peserta", bold: true });
    if (rankInfoCabang) infoLines.push({ text: "Peringkat Cabang " + (rankInfoCabang.cabangNama || '') + " : #" + rankInfoCabang.peringkat + " dari " + rankInfoCabang.totalPeserta + " peserta", bold: true });

    var titleH = 18;      
    var lineGap = 6;
    var headerPadBottom = 8;
    var headerH = titleH + 5 + (infoLines.length * lineGap) + headerPadBottom; 
    if (headerH < 45) headerH = 45;

    var maxLogoW = 38, maxLogoH = headerH - 20;
    if (maxLogoH < 12) maxLogoH = 12;
    var logoW = maxLogoW, logoH = maxLogoW / LOGO_RATIO;
    if (logoH > maxLogoH) { logoH = maxLogoH; logoW = maxLogoH * LOGO_RATIO; }
    var logoX = pageW - marginX - logoW;
    var logoY = (headerH - logoH) / 2;

    doc.setFillColor(255, 255, 255);
    doc.rect(0, 0, pageW, headerH, 'F');

    doc.setFont("helvetica", "bold"); doc.setFontSize(16); doc.setTextColor(193, 18, 31);
    doc.text("RAPOR HASIL EVALUASI TRYOUT", marginX, titleH);

    doc.setFontSize(10); doc.setTextColor(51, 65, 85);
    var curY = titleH + 8;
    infoLines.forEach(function (line) {
      doc.setFont("helvetica", line.bold ? "bold" : "normal");
      if(line.bold) doc.setTextColor(15, 23, 42); else doc.setTextColor(71, 85, 105);
      doc.text(line.text, marginX, curY);
      curY += lineGap;
    });

    if (LOGO_DATAURL) {
      try { doc.addImage(LOGO_DATAURL, 'PNG', logoX, logoY, logoW, logoH); } catch (e) { console.warn(e); }
    }

    doc.setDrawColor(193, 18, 31); doc.setLineWidth(1.5); doc.line(marginX, headerH, pageW - marginX, headerH);

    var startY = headerH + 10;

    var bodyRows = (sesiObj.subjects || []).map(function(s) {
      return [s.nama, s.benar, s.salah, s.kosong, Number(s.nilai).toFixed(2)];
    });

    doc.autoTable({
      startY: startY,
      margin: { left: marginX, right: marginX },
      head: [['MATA PELAJARAN', 'BENAR', 'SALAH', 'KOSONG', 'NILAI']],
      body: bodyRows,
      theme: 'grid',
      styles: { fontSize: 9.5, halign: 'center', cellPadding: 3.5, fontStyle: 'bold', textColor: [30, 41, 59] },
      headStyles: { fillColor: [193, 18, 31], textColor: [255, 255, 255], fontSize: 10 },
      columnStyles: { 
        0: { halign: 'left' },
        4: { textColor: [193, 18, 31] }
      },
      alternateRowStyles: { fillColor: [248, 250, 252] }
    });

    var afterTableY = doc.lastAutoTable.finalY + 10;

    doc.setFillColor(241, 245, 249); doc.setDrawColor(203, 213, 225);
    doc.roundedRect(marginX, afterTableY, pageW - marginX * 2, 14, 2, 2, 'FD');
    
    doc.setFontSize(9.5); doc.setTextColor(15, 23, 42); doc.setFont("helvetica", "bold");
    doc.text(
      "RERATA: " + Number(sesiObj.rerata).toFixed(2) + 
      "        TOTAL NILAI: " + Number(sesiObj.total).toFixed(2) + 
      "        KETERANGAN: " + (sesiObj.keterangan || '-'), 
      pageW / 2, afterTableY + 8.5, { align: 'center' }
    );

    var pageHeight = doc.internal.pageSize.getHeight();
    doc.setFontSize(8); doc.setFont("helvetica", "italic"); doc.setTextColor(148, 163, 184);
    doc.text("Dicetak otomatis oleh Portal Rapor Digital - Neutron Murangan", pageW / 2, pageHeight - 10, { align: 'center' });

    doc.save("Rapor_" + siswa.nama.replace(/\s+/g, '_') + "_" + sesiName.replace(/\s+/g, '_') + ".pdf");
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
